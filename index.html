<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>ESPeJe</title>
  <link rel="icon" href="https://www.pekanbaru.go.id/assets/img/logo_kota.png" type="image/x-icon">
  <style>
    /* Reset & Base */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      /* Diperbaiki: gunakan 100% bukan 100vh, dan hapus overflow:hidden */
      height: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f1117;
      /* Dukungan safe-area untuk ponsel dengan notch/dynamic island */
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .iframe-container {
      position: relative;
      width: 100%;
      /* dvh = dynamic viewport height, akurat di mobile saat address bar muncul/hilang */
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      /* Scroll mulus di iOS */
      -webkit-overflow-scrolling: touch;
    }

    /* ====== Loader ====== */
    .loader-wrapper {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f1117;
      z-index: 10;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }

    .loader-wrapper.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top-color: #e8a030;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loader-text {
      margin-top: 16px;
      font-size: 0.95rem;
      color: #8a8f9a;
      letter-spacing: 0.5px;
    }

    .loader-title {
      margin-bottom: 24px;
      font-size: 1.5rem;
      font-weight: 700;
      color: #e8a030;
      letter-spacing: 2px;
    }

    /* ====== Error State ====== */
    .error-msg {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      position: absolute;
      inset: 0;
      background: #0f1117;
      z-index: 5;
    }

    .error-msg.active {
      display: flex;
    }

    .error-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(239, 68, 68, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }

    .error-icon svg {
      width: 28px;
      height: 28px;
      color: #ef4444;
    }

    .error-msg h3 {
      color: #ef4444;
      font-size: 1.1rem;
      margin-bottom: 8px;
    }

    .error-msg p {
      color: #8a8f9a;
      font-size: 0.85rem;
      max-width: 320px;
      line-height: 1.5;
    }

    .retry-btn {
      margin-top: 20px;
      padding: 10px 28px;
      border: none;
      border-radius: 8px;
      background: #e8a030;
      color: #0f1117;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .retry-btn:hover {
      background: #d4911e;
    }

    .retry-btn:active {
      transform: scale(0.96);
    }

    /* Responsif untuk layar kecil */
    @media (max-width: 480px) {
      .loader-title {
        font-size: 1.2rem;
      }
      .spinner {
        width: 40px;
        height: 40px;
      }
    }
  </style>
</head>
<body>

  <div class="iframe-container">

    <!-- Loader -->
    <div class="loader-wrapper" id="loader">
      <div class="loader-title">ESPeJe</div>
      <div class="spinner"></div>
      <div class="loader-text">Memuat aplikasi...</div>
    </div>

    <!-- Error State -->
    <div class="error-msg" id="errorMsg">
      <div class="error-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
        </svg>
      </div>
      <h3>Gagal Memuat</h3>
      <p>Aplikasi tidak dapat dimuat. Periksa koneksi internet Anda dan coba lagi.</p>
      <button class="retry-btn" onclick="retryLoad()">Coba Lagi</button>
    </div>

    <!-- Iframe -->
    <iframe
      id="appFrame"
      src="https://script.google.com/macros/s/AKfycbwbb17IiGZ0mTBtkqJIelCZe_DiB_yHSMDT9e26sibLv-d8PGcE1MHy8jM7uxY2DsxWBg/exec"
      title="IT LIMAPULUH"
      allowfullscreen
      loading="eager">
    </iframe>

  </div>

  <script>
    const loader = document.getElementById('loader');
    const errorMsg = document.getElementById('errorMsg');
    const iframe = document.getElementById('appFrame');

    // Timeout: jika iframe tidak dimuat dalam 30 detik, tampilkan error
    let loadTimeout = setTimeout(() => {
      loader.classList.add('hidden');
      errorMsg.classList.add('active');
    }, 30000);

    // Iframe berhasil dimuat
    iframe.addEventListener('load', () => {
      clearTimeout(loadTimeout);
      loader.classList.add('hidden');
    });

    // Iframe gagal dimuat
    iframe.addEventListener('error', () => {
      clearTimeout(loadTimeout);
      loader.classList.add('hidden');
      errorMsg.classList.add('active');
    });

    // Tombol coba lagi
    function retryLoad() {
      errorMsg.classList.remove('active');
      loader.classList.remove('hidden');
      // Reset timeout
      clearTimeout(loadTimeout);
      loadTimeout = setTimeout(() => {
        loader.classList.add('hidden');
        errorMsg.classList.add('active');
      }, 30000);
      // Reload iframe
      iframe.src = iframe.src;
    }

    // Perbaikan tinggi pada mobile saat address bar berubah
    function setVH() {
      const vh = window.innerHeight * 0.01;
      document.documentElement.style.setProperty('--vh', `${vh}px`);
    }

    setVH();
    window.addEventListener('resize', setVH);
  </script>

</body>
</html>
